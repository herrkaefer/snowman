<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect width="400" height="400" fill="#111" />
  
  <!-- Retro Grid Background -->
  <path d="M0 320 H400 M0 340 H400 M0 360 H400 M0 380 H400 M40 300 V400 M80 300 V400 M120 300 V400 M160 300 V400 M200 300 V400 M240 300 V400 M280 300 V400 M320 300 V400 M360 300 V400" stroke="#0ea5e9" stroke-width="1" opacity="0.3" />

  <!-- Snowman Silhouette (Centered and Enlarged) -->
  <g transform="translate(0, -20)">
    <!-- Body -->
    <rect x="120" y="210" width="160" height="130" fill="#fff" />
    <rect x="110" y="230" width="180" height="90" fill="#fff" />
    
    <!-- Head -->
    <rect x="150" y="100" width="100" height="100" fill="#fff" />
    <rect x="140" y="120" width="120" height="60" fill="#fff" />

    <!-- Eyes (Matrix Green Glow) -->
    <rect x="170" y="140" width="15" height="15" fill="#22c55e" />
    <rect x="215" y="140" width="15" height="15" fill="#22c55e" />
    
    <!-- Scarf (Red) -->
    <rect x="140" y="190" width="120" height="20" fill="#ef4444" />
    <rect x="220" y="210" width="20" height="50" fill="#ef4444" />

    <!-- Antennas (Comm Link) -->
    <rect x="195" y="70" width="10" height="30" fill="#64748b" />
    <circle cx="200" cy="65" r="8" fill="#ef4444" />
  </g>
</svg>
