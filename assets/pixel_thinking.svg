<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect width="400" height="400" fill="#000" />
  
  <!-- Grid -->
  <path d="M0 200 H400 M200 0 V400" stroke="#111" stroke-width="2" />

  <!-- Snowman Silhouette -->
  <!-- Body -->
  <rect x="140" y="220" width="120" height="100" fill="#fff" />
  <rect x="130" y="240" width="140" height="60" fill="#fff" />
  
  <!-- Head -->
  <rect x="160" y="140" width="80" height="70" fill="#fff" />
  
  <!-- Animated Eyes (Thinking) -->
  <rect x="175" y="165" width="10" height="10" fill="#22c55e">
    <animate attributeName="fill" values="#22c55e;#14532d;#22c55e" dur="1s" repeatCount="indefinite" />
  </rect>
  <rect x="215" y="165" width="10" height="10" fill="#22c55e">
    <animate attributeName="fill" values="#22c55e;#14532d;#22c55e" dur="1s" repeatCount="indefinite" />
  </rect>

  <!-- Processing Core -->
  <rect x="190" y="250" width="20" height="20" fill="#000" />
  <rect x="195" y="255" width="10" height="10" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.5s" repeatCount="indefinite" />
  </rect>

  <text x="200" y="370" font-family="monospace" font-size="24" fill="#22c55e" text-anchor="middle">STATUS: THINKING...</text>
</svg>
