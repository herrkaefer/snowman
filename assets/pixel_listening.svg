<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect width="400" height="400" fill="#000" />
  
  <!-- Snowman -->
  <rect x="140" y="220" width="120" height="100" fill="#fff" />
  <rect x="160" y="140" width="80" height="70" fill="#fff" />
  
  <!-- Listening Eyes (Wide) -->
  <rect x="170" y="165" width="20" height="10" fill="#3b82f6" />
  <rect x="210" y="165" width="20" height="10" fill="#3b82f6" />

  <!-- Voice Waves -->
  <g>
    <rect x="120" y="180" width="10" height="40" fill="#3b82f6">
      <animate attributeName="height" values="10;60;10" dur="0.8s" repeatCount="indefinite" />
      <animate attributeName="y" values="195;170;195" dur="0.8s" repeatCount="indefinite" />
    </rect>
    <rect x="100" y="190" width="10" height="20" fill="#3b82f6" opacity="0.6">
      <animate attributeName="height" values="5;40;5" dur="1s" repeatCount="indefinite" />
      <animate attributeName="y" values="197;180;197" dur="1s" repeatCount="indefinite" />
    </rect>
    <rect x="270" y="180" width="10" height="40" fill="#3b82f6">
      <animate attributeName="height" values="10;60;10" dur="0.8s" repeatCount="indefinite" />
      <animate attributeName="y" values="195;170;195" dur="0.8s" repeatCount="indefinite" />
    </rect>
    <rect x="290" y="190" width="10" height="20" fill="#3b82f6" opacity="0.6">
      <animate attributeName="height" values="5;40;5" dur="1s" repeatCount="indefinite" />
      <animate attributeName="y" values="197;180;197" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>

  <text x="200" y="370" font-family="monospace" font-size="24" fill="#3b82f6" text-anchor="middle">RECOGNIZING...</text>
</svg>
